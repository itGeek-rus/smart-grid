version: "3"

vars:
  BIN_DIR: bin
  APP: processor
  GOFLAGS: -trimpath

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list

  deps:
    desc: Download Go modules
    cmds:
      - go mod download
      - go mod tidy

  fmt:
    desc: Format code
    cmds:
      - gofmt -w .
      - go run golang.org/x/tools/cmd/goimports@latest -w -local github.com/itGeek-rus/smart-grid.git .

  lint:
    desc: Run golangci-lint
    cmds:
      - go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@latest
      - golangci-lint run ./...

  test:
    desc: Run unit test
    cmds:
      - go test ./... -count=1 -race

  build:
    desc: Build processor binary
    cmds:
      - mkdir -p {{.BIN_DIR}}
      - go build {{.GOFLAGS}} -o {{.BIN_DIR}}/{{.APP}} ./cmd/processor

  run:
    desc: Run processor locally
    deps: [build]
    cmds:
      - ./{{.BIN_DIR}}/{{.APP}}

  migrate:
    desc: Apply DB migrations
    cmds:
      - ./scripts/migrate.sh

  docker:up:
    desc: Start local infrastructure
    cmds:
      - docker compose up  --env-file .env.example -d

  docker:down:
    desc: Stop local infrastructure
    cmds:
      - docker compose down

  docker:logs:
    desc: Tail infrastructure logs
    cmds:
      - docker compose logs -f --tail=100

  smoke:
    desc: Health-check after run
    cmds:
      - curl -sf http://localhost:8080/healthz

  cleancode:
    desc: Start all checks
    cmds:
      - task: fmt
      - task: lint
      - task: test
      - task: build